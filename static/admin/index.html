<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.4rem; }
    button { font-size: 1rem; padding: .6rem 1.1rem; cursor: pointer; }
    button[disabled] { opacity: .5; cursor: default; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; }
    .muted { color: #666; font-size: .9rem; }
  </style>
</head>
<body>
  <h1>Admin</h1>

  <section>
    <h2>Reise-Index</h2>
    <p class="muted">
      Lädt alle Reisen aus der TourOne-API neu und baut den Index
      (URL &rarr; Reisecode) für die Termin-Anzeige neu auf. Läuft im Hintergrund.
    </p>
    <button id="reindex">Reise-Index neu laden</button>
    <pre id="result" hidden></pre>
  </section>

  <script>
    const btn = document.getElementById("reindex");
    const out = document.getElementById("result");
    btn.addEventListener("click", async () => {
      btn.disabled = true;
      out.hidden = false;
      out.textContent = "Wird gestartet…";
      try {
        const resp = await fetch("/admin/reindex", { method: "POST" });
        const data = await resp.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        out.textContent = "Fehler: " + e;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
